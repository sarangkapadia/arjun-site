<div id="math-section" class="content-section max-w-4xl mx-auto">
  <div id="math-menu" class="text-center">
    <h2 class="text-4xl font-bold mb-10 text-white">Select a Math Game</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="glass p-8 rounded-3xl border-t-4 border-yellow-400">
        <div class="text-5xl mb-4">➕</div>
        <h3 class="text-2xl font-bold mb-4">Addition</h3>
        <button
          onclick="startMathGame('addition')"
          class="bg-yellow-500 text-black px-6 py-2 rounded-full font-bold hover:bg-yellow-400"
        >
          Play Now
        </button>
      </div>
      <div class="glass p-8 rounded-3xl border-t-4 border-red-400">
        <div class="text-5xl mb-4">➖</div>
        <h3 class="text-2xl font-bold mb-4">Subtraction</h3>
        <button
          onclick="startMathGame('subtraction')"
          class="bg-red-500 text-black px-6 py-2 rounded-full font-bold hover:bg-red-400"
        >
          Play Now
        </button>
      </div>
    </div>
  </div>

  <div id="math-game" class="hidden">
    <div class="flex justify-between items-center mb-8">
      <button
        onclick="backToMathMenu()"
        class="text-blue-400 hover:text-blue-300 font-bold text-lg"
      >
        ← Back
      </button>
      <div class="glass px-6 py-2 rounded-full">
        <span class="text-yellow-400 font-bold"
          >Score: <span id="score">0</span></span
        >
      </div>
      <div id="streak" class="glass px-6 py-2 rounded-full hidden">
        <span class="text-green-400 font-bold"
          >🔥 <span id="streak-count">0</span></span
        >
      </div>
    </div>

    <div
      class="bg-gradient-to-br from-blue-500/20 to-purple-500/20 p-12 rounded-3xl text-center mb-8"
    >
      <p class="text-slate-300 mb-4 text-lg">
        Problem <span id="problem-number">1</span> of 10
      </p>
      <div class="text-6xl font-bold text-white mb-8" id="problem">5 + 3</div>

      <div id="feedback" class="mb-6 text-2xl font-bold hidden"></div>

      <div class="mb-8 flex justify-center items-end gap-4">
        <div>
          <label class="text-slate-300 block mb-2 text-lg">Your Answer:</label>
          <input
            type="number"
            id="answer-input"
            class="glass text-4xl font-bold text-white text-center px-6 py-3 rounded-2xl w-32 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="?"
            onkeypress="if (event.key === 'Enter') submitAnswer();"
          />
        </div>
        <button
          onclick="submitAnswer()"
          class="bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-400 transition"
        >
          Check
        </button>
      </div>

      <div id="game-complete" class="hidden text-center">
        <div id="perfect-reward" class="hidden">
          <div id="reward-emoji" class="text-7xl mb-6 animate-bounce">🎁</div>
          <h3 class="text-4xl font-bold text-white mb-4">Perfect Score!</h3>
          <p class="text-3xl text-yellow-400 mb-4">You got 10 out of 10!</p>
          <div class="glass p-8 rounded-3xl mb-8 border-2 border-yellow-400">
            <p class="text-2xl text-white mb-4">Here's your special gift:</p>
            <div id="reward-display" class="text-6xl mb-4">🏆</div>
            <p id="reward-message" class="text-xl text-yellow-300">
              You're a Math Champion!
            </p>
          </div>
          <button
            onclick="backToMathMenu()"
            class="bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-400"
          >
            Play Again
          </button>
        </div>
        <div id="normal-complete">
          <div class="text-5xl mb-4">🎉</div>
          <h3 class="text-3xl font-bold text-white mb-4">Great Job!</h3>
          <p class="text-2xl text-yellow-400 mb-8">
            Final Score: <span id="final-score">0</span>/10
          </p>
          <button
            onclick="backToMathMenu()"
            class="bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-400"
          >
            Play Again
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
