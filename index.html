<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Kapadia | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .about-card {
        transition: all 0.3s ease;
        border-left: 4px solid #3b82f6;
      }
      .about-card:hover {
        transform: translateX(10px);
        background: rgba(59, 130, 246, 0.1);
      }
      /* Kid-friendly animations */
      @keyframes bounce-large {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        50% {
          box-shadow: 0 0 30px rgba(59, 130, 246, 1);
        }
      }
      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-2deg);
        }
        75% {
          transform: rotate(2deg);
        }
      }
      .animate-bounce {
        animation: bounce-large 0.6s infinite;
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s infinite;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body class="text-slate-200 font-sans">
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
      <div class="container mx-auto flex justify-between items-center">
        <span class="text-2xl font-bold tracking-tighter text-blue-400"
          >AK</span
        >
        <div class="space-x-6 font-medium">
          <button
            onclick="showSection('about')"
            class="hover:text-blue-400 transition"
          >
            About Me
          </button>
          <button
            onclick="showSection('math')"
            class="hover:text-blue-400 transition"
          >
            Math Games
          </button>
        </div>
      </div>
    </nav>

    <div class="container mx-auto px-4 pb-20" id="content-container">
      <!-- Content will be loaded here -->
    </div>

    <script>
      let currentGame = null;
      let currentProblem = null;
      let score = 0;
      let streak = 0;
      let problemCount = 0;
      let answered = false;
      let answeredCorrectly = false;
      let currentSection = "about";

      async function loadSection(sectionId) {
        const container = document.getElementById("content-container");
        const fileName = sectionId === "about" ? "about.html" : "math.html";

        try {
          const response = await fetch(fileName);
          const html = await response.text();
          container.innerHTML = html;
          currentSection = sectionId;
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (error) {
          console.error("Error loading section:", error);
        }
      }

      function showSection(sectionId) {
        loadSection(sectionId);
      }

      function startMathGame(gameType) {
        currentGame = gameType;
        score = 0;
        streak = 0;
        problemCount = 0;
        answered = false;
        answeredCorrectly = false;

        document.getElementById("math-menu").classList.add("hidden");
        document.getElementById("math-game").classList.remove("hidden");
        document.getElementById("game-complete").classList.add("hidden");
        document.getElementById("score").textContent = "0";
        document.getElementById("streak-count").textContent = "0";
        document.getElementById("streak").classList.add("hidden");

        generateNextProblem();
      }

      function generateNextProblem() {
        answered = false;
        answeredCorrectly = false;
        problemCount++;

        if (problemCount > 10) {
          showGameComplete();
          return;
        }

        document.getElementById("problem-number").textContent = problemCount;
        document.getElementById("feedback").classList.add("hidden");
        document.getElementById("answer-input").value = "";
        document.getElementById("answer-input").disabled = false;
        document.getElementById("answer-input").focus();

        if (currentGame === "addition") {
          const num1 = Math.floor(Math.random() * 10) + 1; // 1-10
          const num2 = Math.floor(Math.random() * 10) + 1; // 1-10
          const answer = num1 + num2;
          currentProblem = { num1, num2, answer, type: "addition" };
          document.getElementById("problem").textContent = `${num1} + ${num2}`;
        } else {
          const num1 = Math.floor(Math.random() * 11) + 5; // 5-15
          const num2 = Math.floor(Math.random() * num1); // 0 to num1
          const answer = num1 - num2;
          currentProblem = { num1, num2, answer, type: "subtraction" };
          document.getElementById("problem").textContent = `${num1} - ${num2}`;
        }
      }

      function submitAnswer() {
        const inputValue = document.getElementById("answer-input").value.trim();
        if (!inputValue) return;
        const selectedAnswer = parseInt(inputValue);
        checkAnswer(selectedAnswer);
      }

      function checkAnswer(selectedAnswer) {
        if (answered) return;

        answered = true;
        const isCorrect = selectedAnswer === currentProblem.answer;
        answeredCorrectly = isCorrect;

        const feedback = document.getElementById("feedback");
        document.getElementById("answer-input").disabled = true;

        if (isCorrect) {
          score++;
          streak++;
          document.getElementById("score").textContent = score;
          if (streak > 0) {
            document.getElementById("streak").classList.remove("hidden");
            document.getElementById("streak-count").textContent = streak;
          }

          feedback.innerHTML = "✅ Correct!";
          feedback.style.color = "#4ade80";
          feedback.classList.remove("hidden");
          document.getElementById("answer-input").style.background =
            "rgba(74, 222, 128, 0.3)";
        } else {
          streak = 0;
          document.getElementById("streak-count").textContent = "0";

          feedback.innerHTML = `❌ Oops! The answer is ${currentProblem.answer}`;
          feedback.style.color = "#f87171";
          feedback.classList.remove("hidden");
          document.getElementById("answer-input").style.background =
            "rgba(248, 113, 113, 0.3)";
        }

        setTimeout(() => {
          document.getElementById("answer-input").style.background = "";
          generateNextProblem();
        }, 2000);
      }

      const surpriseRewards = [
        {
          emoji: "🏆",
          title: "Math Champion!",
          message: "You're a true math master!",
        },
        {
          emoji: "🚀",
          title: "Math Rocket!",
          message: "You're flying high with math!",
        },
        {
          emoji: "👑",
          title: "Math King!",
          message: "You're royalty in the math world!",
        },
        {
          emoji: "⭐",
          title: "Super Star!",
          message: "You shine like a brilliant star!",
        },
        {
          emoji: "🦸",
          title: "Math Hero!",
          message: "You saved the day with perfect math!",
        },
        {
          emoji: "💎",
          title: "Diamond Mind!",
          message: "Your brain is a precious gem!",
        },
        {
          emoji: "🔥",
          title: "On Fire!",
          message: "You're burning up at math!",
        },
        {
          emoji: "🎪",
          title: "Math Genius!",
          message: "Your brain is absolutely genius!",
        },
        {
          emoji: "🌟",
          title: "Shining Bright!",
          message: "You're a mathematical supernova!",
        },
        {
          emoji: "🎯",
          title: "Bullseye!",
          message: "Perfect aim, perfect score!",
        },
        {
          emoji: "🏅",
          title: "Gold Medalist!",
          message: "You won the math Olympics!",
        },
        {
          emoji: "🎨",
          title: "Math Artist!",
          message: "You paint with numbers beautifully!",
        },
      ];

      function getRandomReward() {
        return surpriseRewards[
          Math.floor(Math.random() * surpriseRewards.length)
        ];
      }

      function showGameComplete() {
        document.getElementById(
          "answer-input",
        ).parentElement.parentElement.style.display = "none";
        document.getElementById("game-complete").classList.remove("hidden");
        document.getElementById("final-score").textContent = score;

        if (score === 10) {
          const reward = getRandomReward();
          document.getElementById("reward-emoji").textContent = "🎁";
          document.getElementById("reward-display").textContent = reward.emoji;
          document.getElementById("reward-message").textContent =
            reward.message;

          document.getElementById("perfect-reward").classList.remove("hidden");
          document.getElementById("normal-complete").classList.add("hidden");
        } else {
          document.getElementById("perfect-reward").classList.add("hidden");
          document.getElementById("normal-complete").classList.remove("hidden");
        }
      }

      function backToMathMenu() {
        document.getElementById("math-game").classList.add("hidden");
        document.getElementById("math-menu").classList.remove("hidden");
        document.getElementById(
          "answer-input",
        ).parentElement.parentElement.style.display = "flex";
        document.getElementById("answer-input").style.background = "";
        document.getElementById("answer-input").value = "";
        document.getElementById("game-complete").classList.add("hidden");
        currentGame = null;
        currentProblem = null;
        answered = false;
      }

      // Load the about section on page load
      window.addEventListener("DOMContentLoaded", () => {
        loadSection("about");
      });
    </script>
  </body>
</html>
