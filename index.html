<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Kapadia | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .about-card {
        transition: all 0.3s ease;
        border-left: 4px solid #3b82f6;
      }
      .about-card:hover {
        transform: translateX(10px);
        background: rgba(59, 130, 246, 0.1);
      }
    </style>
  </head>
  <body class="text-slate-200 font-sans">
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
      <div class="container mx-auto flex justify-between items-center">
        <span class="text-2xl font-bold tracking-tighter text-blue-400"
          >AK</span
        >
        <div class="space-x-6 font-medium">
          <button
            onclick="showSection('about')"
            class="hover:text-blue-400 transition"
          >
            About Me
          </button>
          <button
            onclick="showSection('math')"
            class="hover:text-blue-400 transition"
          >
            Math Games
          </button>
        </div>
      </div>
    </nav>

    <div class="container mx-auto px-4 pb-20" id="content-container">
      <!-- Content will be loaded here -->
    </div>

    <script>
      let currentGame = null;
      let currentProblem = null;
      let score = 0;
      let streak = 0;
      let problemCount = 0;
      let answered = false;
      let answeredCorrectly = false;
      let currentSection = "about";

      async function loadSection(sectionId) {
        const container = document.getElementById("content-container");
        const fileName = sectionId === "about" ? "about.html" : "math.html";

        try {
          const response = await fetch(fileName);
          const html = await response.text();
          container.innerHTML = html;
          currentSection = sectionId;
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (error) {
          console.error("Error loading section:", error);
        }
      }

      function showSection(sectionId) {
        loadSection(sectionId);
      }

      function startMathGame(gameType) {
        currentGame = gameType;
        score = 0;
        streak = 0;
        problemCount = 0;
        answered = false;
        answeredCorrectly = false;

        document.getElementById("math-menu").classList.add("hidden");
        document.getElementById("math-game").classList.remove("hidden");
        document.getElementById("game-complete").classList.add("hidden");
        document.getElementById("score").textContent = "0";
        document.getElementById("streak-count").textContent = "0";
        document.getElementById("streak").classList.add("hidden");

        generateNextProblem();
      }

      function generateNextProblem() {
        answered = false;
        answeredCorrectly = false;
        problemCount++;

        if (problemCount > 10) {
          showGameComplete();
          return;
        }

        document.getElementById("problem-number").textContent = problemCount;
        document.getElementById("feedback").classList.add("hidden");

        if (currentGame === "addition") {
          const num1 = Math.floor(Math.random() * 10) + 1; // 1-10
          const num2 = Math.floor(Math.random() * 10) + 1; // 1-10
          const answer = num1 + num2;
          currentProblem = { num1, num2, answer, type: "addition" };
          document.getElementById("problem").textContent = `${num1} + ${num2}`;
        } else {
          const num1 = Math.floor(Math.random() * 11) + 5; // 5-15
          const num2 = Math.floor(Math.random() * num1); // 0 to num1
          const answer = num1 - num2;
          currentProblem = { num1, num2, answer, type: "subtraction" };
          document.getElementById("problem").textContent = `${num1} - ${num2}`;
        }

        generateAnswerButtons();
      }

      function generateAnswerButtons() {
        const container = document.getElementById("answers-container");
        container.innerHTML = "";

        const correctAnswer = currentProblem.answer;
        const answers = new Set([correctAnswer]);

        // Generate 3 more wrong answers
        while (answers.size < 4) {
          const wrongAnswer = Math.floor(Math.random() * 20);
          if (wrongAnswer !== correctAnswer) {
            answers.add(wrongAnswer);
          }
        }

        // Shuffle answers
        const answersArray = Array.from(answers).sort(
          () => Math.random() - 0.5,
        );

        answersArray.forEach((ans) => {
          const button = document.createElement("button");
          button.textContent = ans;
          button.onclick = () => checkAnswer(ans);
          button.className =
            "answer-btn glass p-6 rounded-2xl text-2xl font-bold text-white hover:bg-blue-500/20 transition disabled:opacity-50";
          button.id = `answer-${ans}`;
          container.appendChild(button);
        });
      }

      function checkAnswer(selectedAnswer) {
        if (answered) return;

        answered = true;
        const isCorrect = selectedAnswer === currentProblem.answer;
        answeredCorrectly = isCorrect;

        const feedback = document.getElementById("feedback");
        const allAnswerButtons = document.querySelectorAll(".answer-btn");
        allAnswerButtons.forEach((btn) => (btn.disabled = true));

        if (isCorrect) {
          score++;
          streak++;
          document.getElementById("score").textContent = score;
          if (streak > 0) {
            document.getElementById("streak").classList.remove("hidden");
            document.getElementById("streak-count").textContent = streak;
          }

          feedback.innerHTML = "✅ Correct!";
          feedback.style.color = "#4ade80";
          feedback.classList.remove("hidden");
          document.getElementById(`answer-${selectedAnswer}`).style.background =
            "rgba(74, 222, 128, 0.3)";
        } else {
          streak = 0;
          document.getElementById("streak-count").textContent = "0";

          feedback.innerHTML = `❌ Oops! The answer is ${currentProblem.answer}`;
          feedback.style.color = "#f87171";
          feedback.classList.remove("hidden");
          document.getElementById(`answer-${selectedAnswer}`).style.background =
            "rgba(248, 113, 113, 0.3)";
          document.getElementById(
            `answer-${currentProblem.answer}`,
          ).style.background = "rgba(74, 222, 128, 0.3)";
        }

        setTimeout(() => {
          generateNextProblem();
        }, 2000);
      }

      function showGameComplete() {
        document.getElementById("answers-container").innerHTML = "";
        document.getElementById(
          "answers-container",
        ).parentElement.style.display = "none";
        document.getElementById("game-complete").classList.remove("hidden");
        document.getElementById("final-score").textContent = score;
      }

      function backToMathMenu() {
        document.getElementById("math-game").classList.add("hidden");
        document.getElementById("math-menu").classList.remove("hidden");
        document.getElementById(
          "answers-container",
        ).parentElement.style.display = "block";
        currentGame = null;
        currentProblem = null;
        answered = false;
      }

      // Load the about section on page load
      window.addEventListener("DOMContentLoaded", () => {
        loadSection("about");
      });
    </script>
  </body>
</html>
